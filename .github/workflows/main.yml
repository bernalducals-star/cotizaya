name: Actualizar noticias

permissions:
  contents: write

on:
  schedule:
    - cron: "0 9,18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: node scripts/fetch-news.js

      - name: Commit noticias.json
        run: |
          git config user.name "cotizaya-bot"
          git config user.email "bot@cotizaya.com"
          git add noticias/noticias.json
          git diff --cached --quiet || git commit -m "chore: actualizar noticias [skip ci]"
          git push

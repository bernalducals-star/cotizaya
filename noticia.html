<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noticia - CotizaYa</title>
  <meta name="description" content="Noticia económica de CotizaYa" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .noticia-container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .noticia-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent, #00b894);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      font-weight: 600;
    }
    .noticia-back:hover { opacity: 0.8; }
    .noticia-categoria {
      display: inline-block;
      background: var(--accent, #00b894);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .noticia-titulo {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 12px;
      color: var(--text-color);
    }
    .noticia-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--muted-text);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .noticia-meta span { display: flex; align-items: center; gap: 4px; }
    .noticia-imagen {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 24px;
      background: var(--card-bg);
    }
    .noticia-imagen-placeholder {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, var(--accent, #00b894) 0%, #0984e3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .noticia-resumen {
      font-size: 1.1rem;
      line-height: 1.75;
      color: var(--text-color);
      margin-bottom: 28px;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 10px;
      border-left: 4px solid var(--accent, #00b894);
    }
    .noticia-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .noticia-tag {
      background: var(--card-bg);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--muted-text);
    }
    .noticia-fuente-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card-bg);
      border-radius: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .noticia-fuente-box p { margin: 0; font-size: 0.9rem; color: var(--muted-text); }
    .noticia-fuente-box a {
      background: var(--accent, #00b894);
      color: #fff;
      padding: 8px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .noticia-fuente-box a:hover { opacity: 0.85; }
    .noticias-relacionadas h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-color);
    }
    .relacionadas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .relacionada-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 14px;
      text-decoration: none;
      color: var(--text-color);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .relacionada-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .relacionada-card .r-source {
      font-size: 0.75rem;
      color: var(--accent, #00b894);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .relacionada-card .r-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .noticia-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted-text);
    }
    .noticia-error {
      text-align: center;
      padding: 60px 20px;
    }
    .noticia-error h2 { margin-bottom: 12px; }

    /* Banner Radar Mundial */
    .radar-banner {
      background: #1a6b2e;
      color: white;
      text-align: center;
      padding: 10px 16px;
      font-size: 14px;
      position: sticky;
      top: 0;
      z-index: 10000;
    }
    .radar-banner a {
      color: #FFD700;
      font-weight: bold;
      margin-left: 8px;
      text-decoration: none;
    }
    .radar-banner a:hover { text-decoration: underline; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9801320510437563" crossorigin="anonymous"></script>
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, "clarity", "script", "x59cz2mynz");</script>
</head>
<body>
<!-- NAV ÚNICA -->
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="logo" style="text-decoration:none;">Cotiza<span>Ya</span></a>
      <div class="nav-links">
        <a href="/dolar-blue">Dólar</a>
        <a href="/conversor-euro-peso.html">Euro</a>
        <a href="/#cripto">Cripto</a>
        <a href="/aprender">Aprender</a>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema"><span id="theme-icon"></span></button>
    </div>
  </header>

  <main>
    <div class="noticia-container">
      <div id="noticia-content">
        <div class="noticia-loading">Cargando noticia…</div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 <a href="/">CotizaYa</a> &bull; Datos actualizados diariamente &bull; <a href="/about.html">Sobre nosotros</a></p>
  </footer>

  <script>
    const yearEl = document.getElementById('year'); if (yearEl) yearEl.textContent = new Date().getFullYear();

    // Theme toggle — alineado con el resto del sitio (body.dark + cotizaya_theme_v1)
    (function() {
      var THEME_KEY = "cotizaya_theme_v1";
      function moonSVG(c){ return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 13.2A7.5 7.5 0 0 1 10.8 3 8.5 8.5 0 1 0 21 13.2Z" stroke="' + c + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }
      function sunSVG(c){ return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="' + c + '" stroke-width="2"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M5 19l1.5-1.5" stroke="' + c + '" stroke-width="2" stroke-linecap="round"/></svg>'; }
      function applyTheme(mode) {
        var isDark = mode === "dark";
        document.body.classList.toggle("dark", isDark);
        var icon = document.getElementById("theme-icon");
        var btn = document.getElementById("theme-toggle");
        if (icon) icon.innerHTML = isDark ? sunSVG("#ffffff") : moonSVG("#111111");
        if (btn) btn.setAttribute("aria-label", isDark ? "Cambiar a modo claro" : "Cambiar a modo oscuro");
      }
      var saved = localStorage.getItem(THEME_KEY);
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(saved || (prefersDark ? "dark" : "light"));
      document.addEventListener("DOMContentLoaded", function() {
        var btn = document.getElementById("theme-toggle");
        if (btn) btn.addEventListener("click", function() {
          var next = document.body.classList.contains("dark") ? "light" : "dark";
          applyTheme(next);
          localStorage.setItem(THEME_KEY, next);
        });
      });
    })();

    // Obtener slug de la URL
    function getSlugFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    // Renderizar noticia
    async function loadNoticia() {
      const slug = getSlugFromURL();
      const container = document.getElementById('noticia-content');

      if (!slug) {
        container.innerHTML = `
          <div class="noticia-error">
            <h2>Noticia no encontrada</h2>
            <p>No se especificó ningún artículo.</p>
            <a href="/#noticias" style="color: var(--accent)">← Volver a noticias</a>
          </div>`;
        return;
      }

      try {
        // Buscar primero en noticias.json (GitHub Actions)
        let noticia = null;
        let noticias = [];
        try {
          const res = await fetch('/noticias/noticias.json');
          if (res.ok) {
            noticias = await res.json();
            noticia = noticias.find(n => n.slug === slug);
          }
        } catch(e) {}

        // Si no encontró, buscar en /articulos/ (Make.com)
        if (!noticia) {
          try {
            const res2 = await fetch(`/articulos/${slug}.json`);
            if (res2.ok) {
              const art = await res2.json();
              noticia = {
                slug: art.slug || slug,
                title: art.title || art.titulo,
                summary: art.summary || art.resumen,
                category: art.category || art.categoria || 'economia',
                source: art.source || art.fuente_nombre || 'CotizaYa',
                date: art.date || art.fecha,
                tags: art.tags || [],
                originalLink: art.originalLink || art.url_fuente || '',
                content: art.content || ''
              };
            }
          } catch(e) {}
        }

        if (!noticia) {
          container.innerHTML = `
            <div class="noticia-error">
              <h2>Noticia no encontrada</h2>
              <p>Es posible que esta noticia ya no esté disponible.</p>
              <a href="/#noticias" style="color: var(--accent)">← Volver a noticias</a>
            </div>`;
          return;
        }

        document.title = `${noticia.title} - CotizaYa`;
        document.querySelector('meta[name="description"]').setAttribute('content', noticia.summary || '');

        const relacionadas = noticias
          .filter(n => n.category === noticia.category && n.slug !== noticia.slug)
          .slice(0, 4);

        const iconos = { economia: '📈', cripto: '₿' };
        const icono = iconos[noticia.category] || '📰';

        const fechaStr = noticia.date
          ? new Date(noticia.date + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' })
          : '';

        container.innerHTML = `
          <a href="/#noticias" class="noticia-back">← Volver a noticias</a>

          <span class="noticia-categoria">${noticia.category}</span>

          <h1 class="noticia-titulo">${noticia.title}</h1>

          <div class="noticia-meta">
            ${fechaStr ? `<span>📅 ${fechaStr}</span>` : ''}
            <span>📰 ${noticia.source}</span>
          </div>

          <div class="noticia-imagen-placeholder">${icono}</div>

          <div class="noticia-resumen">${noticia.summary || ''}</div>

          ${noticia.tags && noticia.tags.length ? `
          <div class="noticia-tags">
            ${noticia.tags.map(t => `<span class="noticia-tag">#${t}</span>`).join('')}
          </div>` : ''}

          <div class="noticia-fuente-box">
            <p>Fuente: <strong>${noticia.source}</strong></p>
            ${noticia.originalLink ? `<a href="${noticia.originalLink}" target="_blank" rel="noopener">Leer nota completa →</a>` : ''}
          </div>

          ${relacionadas.length ? `
          <div class="noticias-relacionadas">
            <h3>Más noticias relacionadas</h3>
            <div class="relacionadas-grid">
              ${relacionadas.map(r => `
                <a href="/noticia.html?slug=${r.slug}" class="relacionada-card">
                  <div class="r-source">${r.source}</div>
                  <div class="r-title">${r.title}</div>
                </a>
              `).join('')}
            </div>
          </div>` : ''}
        `;

      } catch (e) {
        container.innerHTML = `
          <div class="noticia-error">
            <h2>Error al cargar la noticia</h2>
            <a href="/#noticias" style="color: var(--accent)">← Volver a noticias</a>
          </div>`;
      }
    }

    loadNoticia();
  </script>

  <!-- Widget QR -->
  <div id="qr-widget" style="position:fixed;bottom:20px;right:20px;z-index:9999;">
    <button id="qr-toggle" style="background:#111827;border:none;border-radius:12px;padding:10px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.3);">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00b894" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/></svg>
    </button>
    <div id="qr-panel" style="display:none;position:absolute;bottom:50px;right:0;background:#111827;border-radius:16px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);text-align:center;width:180px;">
      <img src="https://quickchart.io/qr?text=https://cotizaya.ar&size=140" width="140" height="140" style="border-radius:8px;display:block;margin:0 auto 8px;" loading="lazy" alt="QR CotizaYa"/>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);font-family:monospace;text-transform:uppercase;letter-spacing:0.08em;">cotizaya.ar</div>
    </div>
  </div>
  <script>
    document.getElementById('qr-toggle').addEventListener('click', function(){
      var p = document.getElementById('qr-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noticia - CotizaYa</title>
  <meta name="description" content="Noticia económica de CotizaYa" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .noticia-container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .noticia-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent, #00b894);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      font-weight: 600;
    }
    .noticia-back:hover { opacity: 0.8; }
    .noticia-categoria {
      display: inline-block;
      background: var(--accent, #00b894);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .noticia-titulo {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 12px;
      color: var(--text, #111);
    }
    .noticia-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-muted, #666);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .noticia-meta span { display: flex; align-items: center; gap: 4px; }
    .noticia-imagen {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 24px;
      background: var(--card-bg, #f5f5f5);
    }
    .noticia-imagen-placeholder {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, var(--accent, #00b894) 0%, #0984e3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .noticia-resumen {
      font-size: 1.1rem;
      line-height: 1.75;
      color: var(--text, #222);
      margin-bottom: 28px;
      padding: 20px;
      background: var(--card-bg, #f9f9f9);
      border-radius: 10px;
      border-left: 4px solid var(--accent, #00b894);
    }
    .noticia-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .noticia-tag {
      background: var(--card-bg, #f0f0f0);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-muted, #555);
    }
    .noticia-fuente-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card-bg, #f5f5f5);
      border-radius: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .noticia-fuente-box p { margin: 0; font-size: 0.9rem; color: var(--text-muted, #666); }
    .noticia-fuente-box a {
      background: var(--accent, #00b894);
      color: #fff;
      padding: 8px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .noticia-fuente-box a:hover { opacity: 0.85; }
    .noticias-relacionadas h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text, #111);
    }
    .relacionadas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .relacionada-card {
      background: var(--card-bg, #fff);
      border: 1px solid var(--border, #e0e0e0);
      border-radius: 10px;
      padding: 14px;
      text-decoration: none;
      color: var(--text, #111);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .relacionada-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .relacionada-card .r-source {
      font-size: 0.75rem;
      color: var(--accent, #00b894);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .relacionada-card .r-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .noticia-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted, #666);
    }
    .noticia-error {
      text-align: center;
      padding: 60px 20px;
    }
    .noticia-error h2 { margin-bottom: 12px; }
  </style>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="logo" style="text-decoration:none;">Cotiza<span>Ya</span></a>
      <nav>
    <a href="/" class="nav-logo">CotizaYa</a>

  <main>
    <div class="noticia-container">
      <div id="noticia-content">
        <div class="noticia-loading">Cargando noticia…</div>
      </div>
    </div>
  </main>

  <footer>
  <p>&copy; 2026 <a href="/">CotizaYa</a> &bull; Datos actualizados diariamente &bull; <a href="/about.html">Sobre nosotros</a></p>
</footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Theme toggle
    const toggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    toggle.textContent = savedTheme === 'dark' ? '🌙' : '🌞';
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      toggle.textContent = next === 'dark' ? '🌙' : '🌞';
    });

    // Obtener slug de la URL
    function getSlugFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug');
}

    // Renderizar noticia
    async function loadNoticia() {
      const slug = getSlugFromURL();
      const container = document.getElementById('noticia-content');

      try {
        const res = await fetch('/noticias/noticias.json');
        const noticias = await res.json();
        const noticia = noticias.find(n => n.slug === slug);

        if (!noticia) {
          container.innerHTML = `
            <div class="noticia-error">
              <h2>Noticia no encontrada</h2>
              <p>Es posible que esta noticia ya no esté disponible.</p>
              <a href="/#noticias" style="color: var(--accent)">← Volver a noticias</a>
            </div>`;
          return;
        }

        document.title = `${noticia.title} - CotizaYa`;
        document.querySelector('meta[name="description"]').setAttribute('content', noticia.summary);

        // Noticias relacionadas (misma categoría, excluyendo la actual)
        const relacionadas = noticias
          .filter(n => n.category === noticia.category && n.slug !== noticia.slug)
          .slice(0, 4);

        const iconos = { economia: '📈', cripto: '₿' };
        const icono = iconos[noticia.category] || '📰';

        container.innerHTML = `
          <a href="/#noticias" class="noticia-back">← Volver a noticias</a>

          <span class="noticia-categoria">${noticia.category}</span>

          <h1 class="noticia-titulo">${noticia.title}</h1>

          <div class="noticia-meta">
            <span>📅 ${new Date(noticia.date + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
            <span>📰 ${noticia.source}</span>
          </div>

          <div class="noticia-imagen-placeholder">${icono}</div>

          <div class="noticia-resumen">${noticia.summary}</div>

          ${noticia.tags.length ? `
          <div class="noticia-tags">
            ${noticia.tags.map(t => `<span class="noticia-tag">#${t}</span>`).join('')}
          </div>` : ''}

          <div class="noticia-fuente-box">
            <p>Fuente: <strong>${noticia.source}</strong></p>
            ${noticia.originalLink ? `<a href="${noticia.originalLink}" target="_blank" rel="noopener">Leer nota completa →</a>` : ''}
          </div>

          ${relacionadas.length ? `
          <div class="noticias-relacionadas">
            <h3>Más noticias relacionadas</h3>
            <div class="relacionadas-grid">
              ${relacionadas.map(r => `
                <a href="/noticia.html?slug=${r.slug}" class="relacionada-card">
                  <div class="r-source">${r.source}</div>
                  <div class="r-title">${r.title}</div>
                </a>
              `).join('')}
            </div>
          </div>` : ''}
        `;

      } catch (e) {
        container.innerHTML = `
          <div class="noticia-error">
            <h2>Error al cargar la noticia</h2>
            <a href="/#noticias" style="color: var(--accent)">← Volver a noticias</a>
          </div>`;
      }
    }

    loadNoticia();
  </script>

</div>

  document.getElementById('qr-toggle').addEventListener('click',function(){
